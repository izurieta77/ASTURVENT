# Sitio Netlify independiente para el dashboard SUPER CHEAP.
# Configura este sitio en Netlify con "Base directory" = super-cheap/
# (Site settings -> Build & deploy -> Base directory).

[build]
  base      = "super-cheap"
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"

[functions]
  node_bundler = "esbuild"
  # Los clientes de Google Cloud traen dependencias dinámicas (gRPC/proto) que
  # esbuild no debe re-empaquetar. Se marcan como externas las DOS librerías
  # (BigQuery y Storage); si falta Storage, el require perezoso de _gcs.js puede
  # fallar al empaquetar y romper la subida de fotos.
  external_node_modules = ["@google-cloud/bigquery", "@google-cloud/storage"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(self), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
